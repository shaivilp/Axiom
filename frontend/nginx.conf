# Strip query strings from access logs so a misbehaving / legacy client
# that ever puts a token in `?token=...` doesn't leak it to disk.
log_format axiom escape=json '{'
  '"remote_addr":"$remote_addr",'
  '"time_local":"$time_local",'
  '"method":"$request_method",'
  '"uri":"$uri",'           # NOTE: $uri, not $request — drops query string
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent"'
'}';

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log axiom;

    # ---- Security headers for the SPA ----
    # helmet() handles the API responses; nginx handles the HTML shell.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP: tight defaults. `connect-src` needs to allow same-origin WS for
    # the live dashboard. `style-src 'unsafe-inline'` is unfortunately
    # required by some shadcn / Radix runtime style injection.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Long cache for hashed Vite assets, short for everything else.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy the REST API to the backend service. Cookies travel
    # automatically — no special configuration needed.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade to the backend. The session cookie travels with
    # the upgrade handshake; no token query string.
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: every non-asset URL falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
