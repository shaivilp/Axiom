name: afkbot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afkbot}
      POSTGRES_USER: ${POSTGRES_USER:-afkbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [afkbot]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3000
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:?DASHBOARD_TOKEN required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-afkbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-afkbot}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:8080}
    volumes:
      - msauth-cache:/data/.msauth-cache
    networks: [afkbot]
    # Note: NOT exposed to host. nginx in the frontend service proxies it.

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HOST_PORT:-8080}:80"
    networks: [afkbot]

networks:
  afkbot:
    driver: bridge

volumes:
  postgres-data:
  msauth-cache:
