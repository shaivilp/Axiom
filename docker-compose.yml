name: afkbot

# Shared hardening fragment: drop all caps, no privilege escalation, pid cap,
# read-only filesystem (services that need writable paths mount tmpfs on them).
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 200
  restart: unless-stopped

services:
  postgres:
    <<: *hardening
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-afkbot}
      POSTGRES_USER: ${POSTGRES_USER:-afkbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Postgres needs some kernel capabilities to chown its data dir on first
    # boot — restore the minimum set rather than running unconfined.
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    tmpfs:
      - /run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [afkbot]

  backend:
    <<: *hardening
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3005
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:?DASHBOARD_TOKEN required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-afkbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-afkbot}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5005}
      TRUST_PROXY: ${TRUST_PROXY:-loopback}
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - msauth-cache:/data/.msauth-cache
    networks: [afkbot]
    # Not exposed to host. nginx in the frontend service proxies it.

  frontend:
    <<: *hardening
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    # nginx needs to write its own pid + caches. Run read-only with tmpfs
    # on the directories it touches at runtime.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    ports:
      - "${HOST_PORT:-5005}:80"
    networks: [afkbot]

networks:
  afkbot:
    driver: bridge

volumes:
  postgres-data:
  msauth-cache:
