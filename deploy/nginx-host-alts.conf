# Host nginx site for the Axiom dashboard over HTTPS via a Cloudflare
# Origin Certificate.
#
# Install on the homelab host (NOT in the container):
#   sudo cp deploy/nginx-host-alts.conf /etc/nginx/conf.d/alts.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Place the Cloudflare Origin Certificate on the host first:
#   sudo install -d -m 700 /etc/ssl/cloudflare
#   sudo nano /etc/ssl/cloudflare/alts.pem    # the Origin Certificate
#   sudo nano /etc/ssl/cloudflare/alts.key    # the Private Key
#   sudo chmod 600 /etc/ssl/cloudflare/alts.key
#
# Set Cloudflare SSL/TLS mode to "Full (strict)", and in the app's .env:
#   ALLOWED_ORIGIN=https://alts.shaivilpatel.me
# (https origin is what flips the session cookie to Secure.)

# WebSocket upgrade map. Uniquely named so it can't clash with an existing
# `map $http_upgrade $connection_upgrade` elsewhere in your nginx config.
map $http_upgrade $axiom_upgrade {
    default upgrade;
    ''      close;
}

# Optional: redirect plain HTTP to HTTPS. Cloudflare already does "Always
# Use HTTPS" at the edge, so this only matters for direct origin hits.
server {
    listen 80;
    listen [::]:80;
    server_name alts.shaivilpatel.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name alts.shaivilpatel.me;

    # Cloudflare Origin Certificate (long-lived, only trusted by Cloudflare).
    ssl_certificate     /etc/ssl/cloudflare/alts.pem;
    ssl_certificate_key /etc/ssl/cloudflare/alts.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # The dashboard's WebSocket payloads are small; allow generous bodies
    # for config import/export but nothing huge.
    client_max_body_size 2m;

    # Everything goes to the container's published HTTP port. The container's
    # own nginx handles SPA routing, /api, and /ws → backend.
    location / {
        proxy_pass http://127.0.0.1:5005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket upgrade for /ws.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $axiom_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
